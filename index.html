<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chúc Mừng Sinh Nhật! 🎉</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: linear-gradient(to bottom, #ff9a9e, #fecfef);
            font-family: 'Arial', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            color: #fff;
            text-align: center;
        }
        #start-btn {
            padding: 15px 30px;
            font-size: 20px;
            font-weight: bold;
            background-color: #ff4757;
            color: white;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
            transition: 0.3s;
        }
        #start-btn:hover { transform: scale(1.1); }
        
        #content { display: none; flex-direction: column; align-items: center; }
        
        .image-container {
            width: 320px;
            height: 320px;
            border-radius: 15px;
            border: 5px solid white;
            overflow: hidden;
            box-shadow: 0 8px 20px rgba(0,0,0,0.3);
            margin-bottom: 25px;
        }
        .image-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: none;
        }
        .image-container img.active { display: block; animation: fadeIn 1s; }
        
        #wish-text {
            font-size: 22px;
            font-weight: bold;
            line-height: 1.5;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
            max-width: 80%;
            min-height: 60px;
        }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

    <button id="start-btn" onclick="startBirthday()">Bấm vào đây để mở quà nhé! ❤️</button>

    <div id="content">
        <div class="image-container">
            <img src="anh1.jpg" class="active" alt="Kỷ niệm 1">
            <img src="anh2.jpg" alt="Kỷ niệm 2">
            <img src="anh3.jpg" alt="Kỷ niệm 3">
        </div>
        <div id="wish-text"></div>
    </div>

    <audio id="bg-music" src="nhac-nen.mp3" loop></audio>

    <script>
        const images = document.querySelectorAll('.image-container img');
        const wishText = document.getElementById('wish-text');
        
        // BẠN CÓ THỂ THAY ĐỔI LỜI CHÚC Ở ĐÂY (Viết trong dấu ngoặc kép)
        const fullWish = "Chúc mừng sinh nhật cậu! Ý nghĩa từng giây phút trôi qua, mong cậu luôn tươi cười rạng rỡ như những bức ảnh này nhé! ✨🎂💖";
        
        let imgIndex = 0;
        let textIndex = 0;

        function startBirthday() {
            document.getElementById('start-btn').style.display = 'none';
            document.getElementById('content').style.display = 'flex';
            
            // Phát nhạc nền
            document.getElementById('bg-music').play().catch(error => {
                console.log("Trình duyệt chặn audio: ", error);
            });
            
            // Chạy hiệu ứng chữ chạy từng ký tự
            typeWriter();
            
            // Cứ mỗi 3 giây (3000ms) sẽ tự động đổi sang ảnh tiếp theo
            setInterval(changeImage, 3000);
        }

        function typeWriter() {
            if (textIndex < fullWish.length) {
                wishText.innerHTML += fullWish.charAt(textIndex);
                textIndex++;
                setTimeout(typeWriter, 80); // Tốc độ xuất hiện của chữ (80ms/chữ)
            }
        }

        function changeImage() {
            images[imgIndex].classList.remove('active');
            imgIndex = (imgIndex + 1) % images.length;
            images[imgIndex].classList.add('active');
        }
    </script>
</body>
</html>
